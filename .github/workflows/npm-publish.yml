# Publishes @acta-team/credentials to the public npm registry when a GitHub Release is created.
# Requires a Repository secret named `npm_token` (npm automation or granular token with publish access).

name: Node.js Package

on:
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test

  publish-npm:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
      - name: Verify npm_token (repository secret)
        run: |
          if [ -z "${NPM_TOKEN_CHECK}" ]; then
            echo "::error::Missing GitHub Actions secret 'npm_token'. It must be a Repository secret on THIS repo (acta-credentials), not only an Environment secret."
            echo "Fix: Settings → Secrets and variables → Actions → Secrets → Repository secrets → New repository secret"
            echo "Name: npm_token   Value: npmjs granular or automation token (starts with npm_)"
            exit 1
          fi
        env:
          NPM_TOKEN_CHECK: ${{ secrets.npm_token }}
      - run: npm ci
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.npm_token }}
